[[connectors]]
allow_override = ["insert_url", "flush_interval_secs"]
id = "victoriametrics_sink"
type = "victoriametrics"

[connectors.params]
insert_url = "http://127.0.0.1:8428/api/v1/import/prometheus"   # Host-exposed VictoriaMetrics import endpoint
flush_interval_secs = 1                                          # Metric push interval in seconds
